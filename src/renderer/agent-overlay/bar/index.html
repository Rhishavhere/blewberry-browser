<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
      }
      .wrap {
        height: 100%;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding: 0 16px 10px;
        background: linear-gradient(
          to top,
          rgba(15, 23, 42, 0.25),
          transparent 72%
        );
        pointer-events: none;
      }
      .pill {
        pointer-events: auto;
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 8px 10px 8px 16px;
        border-radius: 9999px;
        background: rgba(255, 255, 255, 0.95);
        border: 1px solid rgba(148, 163, 184, 0.42);
        box-shadow:
          0 10px 38px rgba(15, 23, 42, 0.16),
          inset 0 1px 0 rgba(255, 255, 255, 0.65);
        backdrop-filter: blur(12px);
        max-width: min(560px, 100%);
      }
      @media (prefers-color-scheme: dark) {
        .pill {
          background: rgba(30, 41, 59, 0.94);
          border-color: rgba(100, 116, 139, 0.45);
        }
        .label {
          color: #f1f5f9;
        }
        .sub {
          color: #94a3b8;
        }
      }
      .row {
        display: flex;
        flex-direction: column;
        gap: 1px;
        min-width: 0;
      }
      .label {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.01em;
        color: #0f172a;
      }
      .sub {
        font-size: 11px;
        font-weight: 500;
        color: #64748b;
      }
      button {
        cursor: pointer;
        flex-shrink: 0;
        border: none;
        border-radius: 9999px;
        padding: 7px 15px;
        font-size: 12px;
        font-weight: 600;
        background: linear-gradient(
          to bottom right,
          #f87171,
          #dc2626
        );
        color: white;
        box-shadow:
          0 2px 10px rgba(220, 38, 38, 0.32),
          inset 0 1px 0 rgba(255, 255, 255, 0.2);
      }
      button:hover {
        filter: brightness(1.05);
      }
      button:active {
        transform: scale(0.98);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="pill" role="status">
        <div class="row">
          <span class="label">Agent controlling this tab</span>
          <span class="sub">Automation in progress · Stop anytime</span>
        </div>
        <button type="button" id="stopBtn">Stop</button>
      </div>
    </div>
    <script>
      document.getElementById("stopBtn")?.addEventListener("click", () => {
        void window.agentOverlayAPI?.stopAgent();
      });
    </script>
  </body>
</html>
